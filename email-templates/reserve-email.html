<!DOCTYPE html>
<html lang="hu">
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
			rel="stylesheet"
		/>
		<style media="all" type="text/css">
			body {
				font-family: Inter, Helvetica, sans-serif;
				-webkit-font-smoothing: antialiased;
				font-size: 16px;
				line-height: 1.3;
				-ms-text-size-adjust: 100%;
				-webkit-text-size-adjust: 100%;
				background-color: #f4f5f6;
				margin: 0;
				padding: 0;
				width: 100%;
			}
		</style>
	</head>
	<body>
		<table
			border="0"
			cellpadding="0"
			cellspacing="0"
			width="100%"
			style="background-color: #f4f5f6"
		>
			<tr>
				<td style="padding: 30px">
					<div style="width: 100%; max-width: 600px; margin: 0 auto">
						<p
							style="
								font-size: 2.5rem;
								line-height: 2.5rem;
								font-weight: 800;
							"
						>
							Új eszközfoglalást adtál le!
						</p>
						<div
							style="
								background-color: #ffffff;
								padding: 30px;
								border-radius: 10px;
								margin-bottom: 35px;
							"
						>
							<div>
								<span style="font-weight: bold"
									>Foglalás időtartalma</span
								>
								<div>2025. május 1. – 2025. május 4.</div>
							</div>
						</div>
						<div>
							<div>
								<span
									style="font-size: 1.5rem; font-weight: 600"
									>Akkumulátorok</span
								>
								<ul
									style="
										list-style: none;
										margin: 10px 0 35px;
										padding: 0;
									"
								>
									<li>Smallrig VB99</li>
									<li>Smallrig VB99</li>
								</ul>
							</div>
							<div>
								<span
									style="font-size: 1.5rem; font-weight: 600"
									>Kiegészítők</span
								>
								<ul
									style="
										list-style: none;
										margin: 10px 0 35px;
										padding: 0;
									"
								>
									<li>Smallrig baseplate</li>
									<li>Smallrig mini follow focus</li>
									<li>Yato szerszámkészlet</li>
									<li>Smallrig 15mm rod szett</li>
								</ul>
							</div>
						</div>
					</div>
				</td>
			</tr>
		</table>

</html>
